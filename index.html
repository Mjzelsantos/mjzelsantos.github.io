<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background: radial-gradient(circle at top left,#061a2e,#050816 60%,#030712);
color:#e5f2ff;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 10%;
background:rgba(5,15,31,0.6);
backdrop-filter:blur(16px);
z-index:1000;
border-bottom:1px solid rgba(56,189,248,0.25);
}

nav h1{
color:#38bdf8;
font-size:18px;
letter-spacing:2px;
text-shadow:0 0 10px rgba(56,189,248,0.4);
}

nav a{
color:#cde7ff;
margin-left:18px;
text-decoration:none;
font-size:14px;
transition:0.3s;
}

nav a:hover{
color:#38bdf8;
text-shadow:0 0 10px rgba(56,189,248,0.5);
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
padding:0 10%;
background:
radial-gradient(circle at top right, rgba(56,189,248,0.18), transparent 40%),
radial-gradient(circle at bottom left, rgba(139,92,246,0.15), transparent 40%);
}

.hero h2{
color:#38bdf8;
font-size:14px;
letter-spacing:4px;
text-transform:uppercase;
}

.hero h1{
font-size:64px;
margin:10px 0;
color:#ffffff;
text-shadow:0 0 25px rgba(56,189,248,0.15);
}

.hero p{
max-width:850px;
color:#a9c7e6;
font-size:17px;
line-height:1.8;
}

.highlight{
color:#38bdf8;
font-weight:600;
}

/* BUTTON */
.btn{
margin-top:25px;
padding:13px 28px;
border:1px solid #38bdf8;
color:#38bdf8;
display:inline-block;
text-decoration:none;
border-radius:8px;
transition:0.3s;
font-size:14px;
box-shadow:0 0 15px rgba(56,189,248,0.1);
}

.btn:hover{
background:linear-gradient(90deg,#38bdf8,#8b5cf6);
color:#050816;
box-shadow:0 0 25px rgba(56,189,248,0.4);
transform:translateY(-2px);
}

/* SECTIONS */
section{
padding:100px 10%;
}

.section-title{
font-size:30px;
color:#38bdf8;
margin-bottom:30px;
text-shadow:0 0 15px rgba(56,189,248,0.15);
}

/* ABOUT */
.about-box{
background:rgba(11,42,74,0.55);
padding:25px;
border-radius:14px;
border:1px solid rgba(56,189,248,0.2);
line-height:1.9;
color:#cde7ff;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* SKILLS GRID */
.skills-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:18px;
}

/* CARD */
.card{
background:linear-gradient(145deg,rgba(11,42,74,0.75),rgba(5,15,31,0.6));
padding:20px;
border-radius:14px;
border:1px solid rgba(56,189,248,0.15);
transition:0.35s ease;
backdrop-filter:blur(10px);
}

.card:hover{
transform:translateY(-8px);
border-color:#38bdf8;
box-shadow:0 15px 35px rgba(56,189,248,0.15);
}

.card h3{
color:#ffffff;
margin-bottom:10px;
font-size:15px;
}

.card ul{
list-style:none;
color:#a9c7e6;
font-size:13px;
line-height:1.8;
}

/* EXPERIENCE */
.exp{
background:rgba(11,42,74,0.6);
padding:20px;
border-radius:14px;
margin-bottom:15px;
border:1px solid rgba(56,189,248,0.15);
transition:0.3s;
}

.exp:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.exp h3{
color:#38bdf8;
font-size:16px;
margin-bottom:8px;
}

.exp p{
color:#a9c7e6;
font-size:14px;
line-height:1.7;
}

/* FOOTER */
footer{
text-align:center;
padding:25px;
color:#7aa6c7;
border-top:1px solid rgba(56,189,248,0.15);
margin-top:40px;
font-size:13px;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:40px;}
nav{flex-direction:column;gap:10px;}
}
</style>
